    .bg-gradient {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 30% 20%, rgba(160,188,246,0.75) 0%, rgba(190,195,235,0.72) 45%, rgba(219,202,224,0.75) 80%, rgba(234,206,219,0.78) 100%);
      z-index: 1;
    }

    /* floating orbs */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.35;
      pointer-events: none;
      z-index: 2;
      animation: floatOrb 14s ease-in-out infinite alternate;
    }
    .orb-1 { width: 400px; height: 400px; background: #A0BCF6; top: -100px; left: -120px; animation-delay: 0s; }
    .orb-2 { width: 500px; height: 500px; background: #CCC7E6; bottom: -180px; right: -140px; animation-delay: -5s; }
    .orb-3 { width: 300px; height: 300px; background: #EACEDB; top: 50%; right: -80px; animation-delay: -9s; }

    @keyframes floatOrb {
      0% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(40px, -25px) scale(1.1); }
      66% { transform: translate(-25px, 35px) scale(0.9); }
      100% { transform: translate(20px, -20px) scale(1.05); }
    }

    /* particle canvas */
    #particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 3;
    }

    .app {
      position: relative;
      z-index: 4;
      width: 100%;
      max-width: 760px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* ----- heading ----- */
    .heading {
      text-align: center;
      margin-bottom: 2.2rem;
      color: #1f2e47;
      font-family: 'Fredoka', sans-serif;
      font-weight: 700;
      font-size: 2.6rem;
      letter-spacing: 0.03em;
      text-shadow: 0 6px 28px rgba(160, 188, 246, 0.35), 0 2px 8px rgba(255, 255, 255, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      flex-wrap: wrap;
      position: relative;
      animation: fadeInDown 0.8s ease-out;
      padding: 0 1rem;
    }

    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .heading .highlight {
      background: linear-gradient(135deg, #2c3e5c, #5a6f8a);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      position: relative;
    }

    .heading .sparkle-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      animation: sparkle 2.5s ease-in-out infinite;
      cursor: default;
      width: 38px;
      height: 38px;
    }

    .heading .sparkle-icon svg {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 2px 8px rgba(255, 215, 0, 0.3));
    }

    @keyframes sparkle {
      0%, 100% { transform: scale(1) rotate(0deg); }
      25% { transform: scale(1.15) rotate(8deg); }
      75% { transform: scale(0.92) rotate(-4deg); }
    }

    .heading::after {
      content: '';
      position: absolute;
      bottom: -14px;
      width: 110px;
      height: 4px;
      background: linear-gradient(90deg, #A0BCF6, #CCC7E6, #EACEDB);
      border-radius: 20px;
      filter: drop-shadow(0 2px 12px rgba(160, 188, 246, 0.4));
      animation: expandWidth 1s ease-out;
    }

    @keyframes expandWidth {
      from { width: 0; opacity: 0; }
      to { width: 110px; opacity: 1; }
    }

    /* ----- carousel container ----- */
    .carousel-wrapper {
      position: relative;
      width: 100%;
      max-width: 340px;
      aspect-ratio: 1 / 1;
      perspective: 1100px;
      transform-style: preserve-3d;
      margin: 0.2rem 0 0.8rem;
    }

    /* ----- card container with 3D transforms ----- */
    .card-container {
      position: absolute;
      width: 100%;
      height: 100%;
      transform:
        rotateY(calc(var(--offset) * 48deg))
        scaleY(calc(1 + var(--abs-offset) * -0.30))
        translateZ(calc(var(--abs-offset) * -32rem))
        translateX(calc(var(--direction) * -5rem));
      filter: blur(calc(var(--abs-offset) * 1.5rem));
      transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
      will-change: transform, filter, opacity;
      cursor: pointer;
    }

    .card-container:hover {
      filter: blur(calc(var(--abs-offset) * 1.1rem)) brightness(1.03);
    }

    /* ----- card surface (glass-morphism) ----- */
    .card {
      width: 100%;
      height: 100%;
      padding: 1.5rem 1.4rem 1.3rem;
      background: linear-gradient(145deg, 
        rgba(255, 255, 255, 0.78) 0%,
        rgba(245, 240, 255, 0.60) 100%
      );
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-radius: 2.4rem;
      color: #2c3e5c;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      box-shadow: 
        0 24px 60px rgba(44, 62, 92, 0.15),
        inset 0 1px 2px rgba(255, 255, 255, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.45);
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
      overflow: hidden;
    }

    .card-container:not([style*="--active: 0"]) .card {
      transform: scale(1.02);
      box-shadow: 0 28px 70px rgba(44, 62, 92, 0.22);
      background: linear-gradient(145deg, 
        rgba(255, 255, 255, 0.88) 0%,
        rgba(245, 240, 255, 0.70) 100%
      );
    }

    /* subtle card shimmer */
    .card::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 30% 20%, rgba(255,255,255,0.25) 0%, transparent 70%);
      pointer-events: none;
      opacity: 0.4;
      transition: opacity 0.6s ease;
    }

    .card-container:hover .card::before {
      opacity: 0.7;
    }

    .card .icon-wrapper {
      width: 2.6rem;
      height: 2.6rem;
      margin-bottom: 0.2rem;
      opacity: var(--active, 0.6);
      transform: scale(var(--active, 0.85)) translateY(calc(var(--active, 0) * -5px));
      transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.05));
      flex-shrink: 0;
      position: relative;
      z-index: 1;
      color: #2c3e5c;
    }

    .card .icon-wrapper svg {
      width: 100%;
      height: 100%;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .card .icon-wrapper svg .fill-primary {
      fill: #A0BCF6;
      stroke: #2c3e5c;
    }

    .card .icon-wrapper svg .fill-secondary {
      fill: #CCC7E6;
      stroke: #2c3e5c;
    }

    .card .icon-wrapper svg .fill-accent {
      fill: #EACEDB;
      stroke: #2c3e5c;
    }

    .card .icon-wrapper svg .no-fill {
      fill: none;
    }

    .card h2 {
      font-family: 'Fredoka', sans-serif;
      font-size: 1.2rem;
      font-weight: 700;
      margin: 0.1rem 0 0.45rem;
      color: #1f2e47;
      letter-spacing: -0.01em;
      background: linear-gradient(135deg, #2c3e5c 0%, #6a7f9a 80%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      transition: all 0.4s ease;
      opacity: var(--active, 0.6);
      transform: translateY(calc(var(--active, 0) * -3px));
      position: relative;
      z-index: 1;
    }

    .card p {
      font-size: 0.88rem;
      line-height: 1.55;
      font-weight: 500;
      color: #2c3e5c;
      text-align: left;
      padding: 0.1rem 0.2rem 0 0.1rem;
      overflow-y: auto;
      max-height: 100%;
      word-wrap: break-word;
      overflow-wrap: break-word;
      white-space: normal;
      opacity: var(--active, 0.55);
      transition: opacity 0.5s ease, transform 0.4s ease;
      transform: translateY(calc(var(--active, 0) * -3px));
      scrollbar-width: thin;
      scrollbar-color: rgba(160, 188, 246, 0.4) transparent;
      flex: 1;
      position: relative;
      z-index: 1;
    }

    .card p::-webkit-scrollbar {
      width: 4px;
    }
    .card p::-webkit-scrollbar-thumb {
      background: rgba(160, 188, 246, 0.5);
      border-radius: 20px;
    }
    .card p::-webkit-scrollbar-track {
      background: transparent;
    }

    /* card number badge */
    .card-badge {
      position: absolute;
      bottom: 1.1rem;
      right: 1.3rem;
      font-size: 0.55rem;
      font-weight: 600;
      color: rgba(44, 62, 92, 0.3);
      letter-spacing: 0.08em;
      background: rgba(255,255,255,0.5);
      padding: 0.15rem 0.7rem;
      border-radius: 40px;
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255,255,255,0.3);
      z-index: 2;
      transition: all 0.3s ease;
    }

    .card-container:hover .card-badge {
      background: rgba(255,255,255,0.7);
      color: rgba(44, 62, 92, 0.5);
    }

    /* ----- navigation buttons (elevated glass) ----- */
    .nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 20;
      width: 3.8rem;
      height: 3.8rem;
      border-radius: 60px;
      border: none;
      background: rgba(255, 255, 255, 0.4);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow: 0 8px 32px rgba(44, 62, 92, 0.10), inset 0 1px 2px rgba(255, 255, 255, 0.7);
      color: #2c3e5c;
      font-size: 3rem;
      font-weight: 300;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      border: 1px solid rgba(255, 255, 255, 0.35);
      line-height: 1;
      padding: 0;
    }

    .nav:hover {
      background: rgba(255, 255, 255, 0.7);
      box-shadow: 0 12px 44px rgba(44, 62, 92, 0.18);
      transform: translateY(-50%) scale(1.08);
      color: #1a2a42;
      border-color: rgba(255, 255, 255, 0.7);
    }

    .nav:active {
      transform: translateY(-50%) scale(0.92);
    }

    .nav.left {
      left: -1.8rem;
    }
    .nav.right {
      right: -1.8rem;
    }

    /* ----- indicator dots ----- */
    .indicators {
      display: flex;
      gap: 0.8rem;
      margin-top: 1.6rem;
      flex-wrap: wrap;
      justify-content: center;
      padding: 0 0.5rem;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 40px;
      background: rgba(44, 62, 92, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.25);
      padding: 0;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.03);
      backdrop-filter: blur(2px);
      position: relative;
    }

    .dot.active {
      width: 36px;
      background: #A0BCF6;
      box-shadow: 0 0 32px rgba(160, 188, 246, 0.45);
      border: 1px solid rgba(255, 255, 255, 0.6);
    }

    .dot:hover {
      background: rgba(160, 188, 246, 0.5);
      transform: scale(1.2);
    }

    .dot.active:hover {
      transform: scale(1.05);
    }

    /* ----- progress bar ----- */
    .progress {
      width: 100%;
      max-width: 360px;
      height: 3px;
      background: rgba(44, 62, 92, 0.06);
      border-radius: 20px;
      margin-top: 1.2rem;
      overflow: hidden;
      position: relative;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #A0BCF6, #CCC7E6, #EACEDB);
      border-radius: 20px;
      transition: width 0.6s cubic-bezier(0.23, 1, 0.32, 1);
      width: 0%;
      position: relative;
    }

    .progress-bar::after {
      content: '';
      position: absolute;
      right: 0;
      top: -1px;
      width: 8px;
      height: 5px;
      background: #A0BCF6;
      border-radius: 20px;
      filter: blur(2px);
      opacity: 0.6;
    }

    /* ----- responsive ----- */
    @media (max-width: 640px) {
      .heading {
        font-size: 2rem;
        margin-bottom: 1.8rem;
        gap: 0.4rem;
      }
      .heading .sparkle-icon {
        width: 30px;
        height: 30px;
      }
      .carousel-wrapper {
        max-width: 300px;
      }
      .card {
        padding: 1.3rem 1.1rem 1.1rem;
        border-radius: 1.8rem;
      }
      .card .icon-wrapper {
        width: 2.3rem;
        height: 2.3rem;
      }
      .card h2 {
        font-size: 1.05rem;
      }
      .card p {
        font-size: 0.82rem;
        line-height: 1.5;
      }
      .card-badge {
        font-size: 0.5rem;
        bottom: 0.8rem;
        right: 1rem;
        padding: 0.1rem 0.6rem;
      }
      .nav {
        width: 3rem;
        height: 3rem;
        font-size: 2.2rem;
      }
      .nav.left {
        left: -1rem;
      }
      .nav.right {
        right: -1rem;
      }
      .indicators {
        gap: 0.6rem;
        margin-top: 1.2rem;
      }
      .dot {
        width: 8px;
        height: 8px;
      }
      .dot.active {
        width: 28px;
      }
      .progress {
        max-width: 280px;
        margin-top: 0.9rem;
      }
    }

    @media (max-width: 430px) {
      .carousel-wrapper {
        max-width: 250px;
      }
      .card {
        padding: 1.1rem 0.9rem 0.9rem;
        border-radius: 1.5rem;
      }
      .card .icon-wrapper {
        width: 2.1rem;
        height: 2.1rem;
      }
      .card h2 {
        font-size: 0.92rem;
        margin: 0 0 0.3rem;
      }
      .card p {
        font-size: 0.74rem;
        line-height: 1.4;
      }
      .card-badge {
        font-size: 0.45rem;
        bottom: 0.6rem;
        right: 0.8rem;
        padding: 0.08rem 0.5rem;
      }
      .heading {
        font-size: 1.5rem;
        margin-bottom: 1.4rem;
      }
      .heading .sparkle-icon {
        width: 26px;
        height: 26px;
      }
      .heading::after {
        width: 80px;
        bottom: -10px;
      }
      .nav {
        width: 2.5rem;
        height: 2.5rem;
        font-size: 1.8rem;
      }
      .nav.left {
        left: -0.7rem;
      }
      .nav.right {
        right: -0.7rem;
      }
      .dot {
        width: 7px;
        height: 7px;
      }
      .dot.active {
        width: 24px;
      }
      .progress {
        max-width: 220px;
        margin-top: 0.7rem;
      }
    }
  </style>
</head>
<body>

  <!-- photo background -->
  <div class="bg-photo"></div>
  <div class="bg-gradient"></div>

  <!-- floating orbs -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <!-- particle canvas -->
  <canvas id="particles"></canvas>

  <div class="app">
    <div class="heading">
      <span>🎂</span>
      <span>Happy Birthday</span>
      <span class="highlight">Dada</span>
      <span class="sparkle-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fbbf24" stroke-width="2">
          <path d="M12 2L14.5 9.5L22 9.5L16 14.5L18.5 22L12 17L5.5 22L8 14.5L2 9.5L9.5 9.5L12 2Z" fill="#fcd34d" stroke="#f59e0b"/>
        </svg>
      </span>
    </div>

    <div class="carousel-wrapper" id="carousel"></div>

    <div class="indicators" id="indicators"></div>

    <div class="progress">
      <div class="progress-bar" id="progressBar"></div>
    </div>
  </div>

  <script>
    // ---- Particle System ----
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let animationId = null;

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    class Particle {
      constructor() {
        this.reset();
      }
      reset() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 3 + 1.5;
        this.speedX = (Math.random() - 0.5) * 0.4;
        this.speedY = (Math.random() - 0.5) * 0.4;
        this.opacity = Math.random() * 0.35 + 0.08;
        this.hue = 220 + Math.random() * 60;
      }
      update() {
        this.x += this.speedX;
        this.y += this.speedY;
        if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
        if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
      }
      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${this.hue}, 70%, 70%, ${this.opacity})`;
        ctx.fill();
        ctx.shadowColor = `hsla(${this.hue}, 80%, 75%, 0.15)`;
        ctx.shadowBlur = 10;
        ctx.fill();
        ctx.shadowBlur = 0;
      }
    }

    function initParticles(count = 45) {
      particles = [];
      for (let i = 0; i < count; i++) {
        particles.push(new Particle());
      }
    }

    function animateParticles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => {
        p.update();
        p.draw();
      });
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 130) {
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.strokeStyle = `rgba(160, 188, 246, ${0.06 * (1 - dist/130)})`;
            ctx.lineWidth = 0.5;
            ctx.stroke();
          }
        }
      }
      animationId = requestAnimationFrame(animateParticles);
    }

    initParticles(45);
    animateParticles();

    // ---- SVG Icons ----
    const ICONS = {
      home: `<svg viewBox="0 0 24 24"><path d="M3 12L12 3L21 12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M5 10V19C5 19.5523 5.44772 20 6 20H18C18.5523 20 19 19.5523 19 19V10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M9 20V14H15V20" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M12 7V9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>`,
      star: `<svg viewBox="0 0 24 24"><path d="M12 2L14.5 9.5L22 9.5L16 14.5L18.5 22L12 17L5.5 22L8 14.5L2 9.5L9.5 9.5L12 2Z" fill="currentColor" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>`,
      camera: `<svg viewBox="0 0 24 24"><rect x="2" y="6" width="20" height="14" rx="2" stroke="currentColor" stroke-width="1.8"/><circle cx="12" cy="13" r="4" stroke="currentColor" stroke-width="1.8"/><path d="M17 6L16 3H8L7 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
      heart: `<svg viewBox="0 0 24 24"><path d="M12 21.35L10.55 20.03C5.4 15.36 2 12.28 2 8.5C2 5.42 4.42 3 7.5 3C9.24 3 10.91 3.81 12 5.09C13.09 3.81 14.76 3 16.5 3C19.58 3 22 5.42 22 8.5C22 12.28 18.6 15.36 13.45 20.03L12 21.35Z" fill="currentColor" stroke="currentColor" stroke-width="1.8"/></svg>`,
      sparkles: `<svg viewBox="0 0 24 24"><path d="M12 2L13.5 8.5L20 10L13.5 11.5L12 18L10.5 11.5L4 10L10.5 8.5L12 2Z" fill="currentColor" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><path d="M19 3L19.5 5.5L22 6L19.5 6.5L19 9L18.5 6.5L16 6L18.5 5.5L19 3Z" fill="currentColor" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/><path d="M5 16L5.5 18.5L8 19L5.5 19.5L5 22L4.5 19.5L2 19L4.5 18.5L5 16Z" fill="currentColor" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/></svg>`,
      leaf: `<svg viewBox="0 0 24 24"><path d="M12 2C12 2 6 6 6 12C6 15.3137 8.68629 18 12 18C15.3137 18 18 15.3137 18 12C18 6 12 2 12 2Z" stroke="currentColor" stroke-width="1.8"/><path d="M12 2V6" stroke="currentColor" stroke-width="1.8"/><path d="M12 18V22" stroke="currentColor" stroke-width="1.8"/><path d="M6 12H2" stroke="currentColor" stroke-width="1.8"/><path d="M22 12H18" stroke="currentColor" stroke-width="1.8"/></svg>`,
      mail: `<svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2" stroke="currentColor" stroke-width="1.8"/><path d="M22 6L12 13L2 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
      champagne: `<svg viewBox="0 0 24 24"><path d="M12 22C15.3137 22 18 19.3137 18 16C18 12.6863 15.3137 10 12 10C8.68629 10 6 12.6863 6 16C6 19.3137 8.68629 22 12 22Z" stroke="currentColor" stroke-width="1.8"/><path d="M12 10V6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M15 3L12 6L9 3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M9 16H15" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M12 13V19" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>`,
      diamond: `<svg viewBox="0 0 24 24"><path d="M12 2L2 12L12 22L22 12L12 2Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M12 2L12 22" stroke="currentColor" stroke-width="1.8"/><path d="M2 12L22 12" stroke="currentColor" stroke-width="1.8"/><path d="M7 7L17 17" stroke="currentColor" stroke-width="1.8"/><path d="M17 7L7 17" stroke="currentColor" stroke-width="1.8"/></svg>`,
      party: `<svg viewBox="0 0 24 24"><path d="M12 2L13.5 8.5L20 10L13.5 11.5L12 18L10.5 11.5L4 10L10.5 8.5L12 2Z" fill="currentColor" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><path d="M18 15L19.5 17.5L22 19L19.5 20.5L18 23L16.5 20.5L14 19L16.5 17.5L18 15Z" fill="currentColor" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/><path d="M6 15L7 16.5L8.5 17.5L7 18.5L6 20L5 18.5L3.5 17.5L5 16.5L6 15Z" fill="currentColor" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/></svg>`
    };

    // ---- Card Content ----
    const CARD_DATA = [
      { icon: 'home', title: 'Home in a Person', content: "Some people come into your life for a season, while others quietly become home without you even realizing it. Somehow, you became one of those people for me. Thank you for being someone I can always look up to, laugh with, and hold close to my heart. I hope life always gives back every bit of kindness you've so effortlessly given to everyone else." },
      { icon: 'star', title: 'The Day Our Paths Crossed', content: "If I could relive one thing, it would be the day life decided our paths should cross. I never imagined I'd find someone who would become this important to me. Thank you for making ordinary moments feel unforgettable. May this year be as gentle and beautiful as your heart." },
      { icon: 'camera', title: 'A Constant', content: "Looking back, I never realized how many of my favorite memories would end up having you in them. Somehow, you became a constant—a person I never have to question, only appreciate. I hope today reminds you of just how deeply loved you truly are." },
      { icon: 'heart', title: 'Pieces of Your Heart', content: "There are people who leave footprints, and then there are people who quietly leave pieces of themselves in your heart. You did both without even trying. Thank you for existing exactly as you are. Never stop being the light that makes everyone around you feel a little safer." },
      { icon: 'sparkles', title: 'A Blessing I Never Knew I Needed', content: "I've always believed that the best people appear when you least expect them. You proved that to me. What started as simply knowing you slowly became one of the greatest blessings I never knew I needed. I hope life continues to be kind to you because you've always been kind to everyone else." },
      { icon: 'leaf', title: 'Staying Genuine', content: "Time has a funny way of changing people, yet somehow every passing year only gives me more reasons to be grateful for you. Thank you for staying genuine in a world that often asks people not to be. I hope your heart never forgets how deeply appreciated it is." },
      { icon: 'mail', title: 'More Than Words', content: "There are days when words don't seem enough to tell someone how much they mean to you. Today is one of those days. So instead, I'll simply say thank you—for every laugh, every conversation, every quiet moment that slowly turned into memories I'll always treasure." },
      { icon: 'champagne', title: 'Grateful For You', content: "One day we'll probably look back at all of this and laugh about how quickly time passed. But if there's one thing I'll always be certain of, it's how grateful I am that I got to spend part of my life knowing someone like you. Keep choosing happiness—you deserve every beautiful thing this life has to offer." },
      { icon: 'diamond', title: 'A Rare Kind of Person', content: "The older we grow, the more I realize that people like you are incredibly rare. Kindness cannot be taught the way you carry it, and sincerity cannot be imitated the way you live it. Never lose those parts of yourself. The world will always need a heart like yours." },
      { icon: 'party', title: 'Many More Birthdays', content: "Birthdays are funny—they celebrate another year of your life, yet somehow the people around you end up feeling like the lucky ones. I'm one of them. Thank you for letting me be part of your journey, for giving me a friendship I'll always hold close, and for simply being you. Happy Birthday, my sweetest Dada. Here's to more memories, more laughter, more dreams, and many more years of celebrating you. I'll always be quietly and loudly rooting for you, today and always." },
    ];

    const MAX_VISIBILITY = 3;
    let active = 0;

    const carouselEl = document.getElementById('carousel');
    const indicatorsEl = document.getElementById('indicators');
    const progressBar = document.getElementById('progressBar');

    function getIconSVG(iconName) {
      return ICONS[iconName] || ICONS.star;
    }

    function render() {
      carouselEl.innerHTML = '';

      CARD_DATA.forEach((c, i) => {
        const offset = (active - i) / 3;
        const absOffset = Math.abs(active - i) / 3;
        const direction = Math.sign(active - i);
        const isActive = i === active;
        const hidden = Math.abs(active - i) > MAX_VISIBILITY;
        const invisible = Math.abs(active - i) >= MAX_VISIBILITY;

        const container = document.createElement('div');
        container.className = 'card-container';
        container.style.setProperty('--offset', offset);
        container.style.setProperty('--abs-offset', absOffset);
        container.style.setProperty('--direction', direction);
        container.style.setProperty('--active', isActive ? 1 : 0);
        container.style.pointerEvents = isActive ? 'auto' : 'none';
        container.style.opacity = invisible ? '0' : '1';
        container.style.display = hidden ? 'none' : 'block';

        container.innerHTML = `
          <div class="card">
            <div class="icon-wrapper">${getIconSVG(c.icon)}</div>
            <h2>${c.title}</h2>
            <p>${c.content}</p>
            <div class="card-badge">${i+1} / ${CARD_DATA.length}</div>
          </div>
        `;

        container.addEventListener('click', () => {
          if (!isActive) {
            active = i;
            render();
          }
        });

        carouselEl.appendChild(container);
      });

      const leftBtn = document.createElement('button');
      leftBtn.className = 'nav left';
      leftBtn.innerHTML = '‹';
      leftBtn.style.display = active > 0 ? 'flex' : 'none';
      leftBtn.setAttribute('aria-label', 'Previous');
      leftBtn.onclick = (e) => { e.stopPropagation(); active = Math.max(0, active - 1); render(); };
      carouselEl.appendChild(leftBtn);

      const rightBtn = document.createElement('button');
      rightBtn.className = 'nav right';
      rightBtn.innerHTML = '›';
      rightBtn.style.display = active < CARD_DATA.length - 1 ? 'flex' : 'none';
      rightBtn.setAttribute('aria-label', 'Next');
      rightBtn.onclick = (e) => { e.stopPropagation(); active = Math.min(CARD_DATA.length - 1, active + 1); render(); };
      carouselEl.appendChild(rightBtn);

      indicatorsEl.innerHTML = '';
      CARD_DATA.forEach((_, i) => {
        const dot = document.createElement('button');
        dot.className = `dot ${i === active ? 'active' : ''}`;
        dot.setAttribute('aria-label', `Go to card ${i+1}`);
        dot.onclick = () => { active = i; render(); };
        indicatorsEl.appendChild(dot);
      });

      const progress = ((active + 1) / CARD_DATA.length) * 100;
      progressBar.style.width = `${progress}%`;
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft' && active > 0) {
        active--;
        render();
        e.preventDefault();
      } else if (e.key === 'ArrowRight' && active < CARD_DATA.length - 1) {
        active++;
        render();
        e.preventDefault();
      }
    });

    let touchStartX = 0;
    let touchEndX = 0;

    document.addEventListener('touchstart', (e) => {
      touchStartX = e.changedTouches[0].screenX;
    }, { passive: true });

    document.addEventListener('touchend', (e) => {
      touchEndX = e.changedTouches[0].screenX;
      const diff = touchStartX - touchEndX;
      if (Math.abs(diff) > 50) {
        if (diff > 0 && active < CARD_DATA.length - 1) {
          active++;
          render();
        } else if (diff < 0 && active > 0) {
          active--;
          render();
        }
      }
    }, { passive: true });

    render();
  </script>
</body>
</html>
