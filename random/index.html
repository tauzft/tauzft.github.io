<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>I Love You ❤️</title>
  <style>
    /* ----- reset & base ----- */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #fce4ec, #f8bbd0, #f48fb1);
      font-size: 62.5%;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      overflow: hidden;
    }

    .container {
      width: 50rem;
      height: 20rem;
      position: relative;
    }

    .svg-container {
      z-index: 2;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .mo-container {
      width: 100%;
      height: 100%;
      position: relative;
      z-index: 1;
    }

    /* ----- SVG styling - Sweet theme ----- */
    .line {
      fill: none;
      stroke: #ffffff;
      stroke-width: 8;
      stroke-linecap: round;
      stroke-miterlimit: 10;
      opacity: 0.8;
    }

    .lttr {
      fill: #6a1b4d;
      transition: none;
      will-change: transform, opacity;
      filter: drop-shadow(0 2px 4px rgba(106, 27, 77, 0.2));
    }

    /* ----- sound toggle ----- */
    .sound {
      position: fixed;
      color: #6a1b4d;
      font-size: 1.6rem;
      bottom: 2rem;
      right: 2rem;
      text-decoration: underline;
      cursor: pointer;
      user-select: none;
      z-index: 20;
      background: rgba(255, 255, 255, 0.85);
      padding: 0.6rem 1.6rem;
      border-radius: 3rem;
      backdrop-filter: blur(4px);
      font-weight: 600;
      letter-spacing: 0.05em;
      box-shadow: 0 4px 15px rgba(106, 27, 77, 0.15);
      transition: all 0.3s ease;
    }
    .sound:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 20px rgba(106, 27, 77, 0.25);
    }
    .sound--off {
      text-decoration: line-through;
      opacity: 0.6;
    }

    /* Sweet background decorations */
    .container::before {
      content: '✨';
      position: absolute;
      top: -30px;
      left: -30px;
      font-size: 3rem;
      animation: float 3s ease-in-out infinite;
    }
    .container::after {
      content: '🌸';
      position: absolute;
      bottom: -30px;
      right: -30px;
      font-size: 3rem;
      animation: float 3s ease-in-out infinite 1.5s;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-10px) rotate(10deg); }
    }

    @media screen and (max-width: 520px) {
      .container { width: 90vw; height: auto; aspect-ratio: 500 / 200; }
      .sound { font-size: 1.4rem; bottom: 1rem; right: 1rem; padding: 0.4rem 1.2rem; }
      .container::before,
      .container::after { display: none; }
    }
  </style>
</head>
<body>

<div class="container">
  <!-- SVG letters & lines -->
  <svg class="svg-container" version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 200" preserveAspectRatio="xMidYMid meet">
    <line class="line line--left" x1="10" y1="17" x2="10" y2="183"></line>
    <line class="line line--rght" x1="490" y1="17" x2="490" y2="183"></line>
    <g>
      <path class="lttr lttr--I" d="M42.2,73.9h11.4v52.1H42.2V73.9z"></path>
      <path class="lttr lttr--L" d="M85.1,73.9h11.4v42.1h22.8v10H85.1V73.9z"></path>
      <path class="lttr lttr--O" d="M123.9,100c0-15.2,11.7-26.9,27.2-26.9s27.2,11.7,27.2,26.9s-11.7,26.9-27.2,26.9S123.9,115.2,123.9,100zM166.9,100c0-9.2-6.8-16.5-15.8-16.5c-9,0-15.8,7.3-15.8,16.5s6.8,16.5,15.8,16.5C160.1,116.5,166.9,109.2,166.9,100z"></path>
      <path class="lttr lttr--V" d="M180.7,73.9H193l8.4,22.9c1.7,4.7,3.5,9.5,5,14.2h0.1c1.7-4.8,3.4-9.4,5.2-14.3l8.6-22.8h11.7l-19.9,52.1h-11.5L180.7,73.9z"></path>
      <path class="lttr lttr--E" d="M239.1,73.9h32.2v10h-20.7v10.2h17.9v9.5h-17.9v12.4H272v10h-33V73.9z"></path>
      <path class="lttr lttr--Y" d="M315.8,102.5l-20.1-28.6H309l6.3,9.4c2,3,4.2,6.4,6.3,9.6h0.1c2-3.2,4.1-6.4,6.3-9.6l6.3-9.4h12.9l-19.9,28.5v23.6h-11.4V102.5z"></path>
      <path class="lttr lttr--O2" d="M348.8,100c0-15.2,11.7-26.9,27.2-26.9c15.5,0,27.2,11.7,27.2,26.9s-11.7,26.9-27.2,26.9C360.5,126.9,348.8,115.2,348.8,100z M391.8,100c0-9.2-6.8-16.5-15.8-16.5c-9,0-15.8,7.3-15.8,16.5s6.8,16.5,15.8,16.5C385,116.5,391.8,109.2,391.8,100z"></path>
      <path class="lttr lttr--U" d="M412.4,101.1V73.9h11.4v26.7c0,10.9,2.4,15.9,11.5,15.9c8.4,0,11.4-4.6,11.4-15.8V73.9h11v26.9c0,7.8-1.1,13.5-4,17.7c-3.7,5.3-10.4,8.4-18.7,8.4c-8.4,0-15.1-3.1-18.8-8.5C413.4,114.2,412.4,108.5,412.4,101.1z"></path>
    </g>
  </svg>
  <!-- mo.js container -->
  <div class="mo-container"></div>
</div>

<!-- audio elements (preload) -->
<audio class="blup" style="display: none" preload="auto">
  <source src="https://www.freesound.org/data/previews/265/265115_4373976-lq.mp3" type="audio/ogg">
</audio>
<audio class="blop" style="display: none" preload="auto">
  <source src="https://www.freesound.org/data/previews/265/265115_4373976-lq.mp3" type="audio/ogg">
</audio>

<div class="sound" id="soundToggle">🔊 sound</div>

<!-- mojs library - FIXED VERSION -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/mo-js/0.288.2/mo.min.js"></script>

<script>
  (function() {
    'use strict';

    const qs = document.querySelector.bind(document);
    const easingHeart = mojs.easing.path('M0,100C2.9,86.7,33.6-7.3,46-7.3s15.2,22.7,26,22.7S89,0,100,0');

    // Sweet color palette
    const sweetColors = {
      text: '#6a1b4d',      // Deep pink-purple
      heart: '#e91e63',     // Vibrant pink
      accent: '#f06292',    // Light pink
      bg: '#fce4ec'         // Very light pink
    };

    const el = {
      container: qs('.mo-container'),
      i: qs('.lttr--I'),
      l: qs('.lttr--L'),
      o: qs('.lttr--O'),
      v: qs('.lttr--V'),
      e: qs('.lttr--E'),
      y: qs('.lttr--Y'),
      o2: qs('.lttr--O2'),
      u: qs('.lttr--U'),
      lineLeft: qs('.line--left'),
      lineRight: qs('.line--rght'),
      colTxt: sweetColors.text,
      colHeart: sweetColors.heart,
      blup: qs('.blup'),
      blop: qs('.blop'),
      sound: qs('#soundToggle')
    };

    // ---- custom heart shape ----
    class Heart extends mojs.CustomShape {
      getShape() {
        return '<path d="M50,88.9C25.5,78.2,0.5,54.4,3.8,31.1S41.3,1.8,50,29.9c8.7-28.2,42.8-22.2,46.2,1.2S74.5,78.2,50,88.9z"/>';
      }
      getLength() { return 200; }
    }
    mojs.addShape('heart', Heart);

    // ---- burst helpers ----
    const crtBoom = (delay = 0, x = 0, rd = 46) => {
      const parent = el.container;
      const crcl = new mojs.Shape({
        shape: 'circle',
        fill: 'none',
        stroke: el.colTxt,
        strokeWidth: { 5: 0 },
        radius: { [rd]: [rd + 20] },
        easing: 'quint.out',
        duration: 500 / 3,
        parent,
        delay,
        x
      });

      const brst = new mojs.Burst({
        radius: { [rd + 15]: 110 },
        angle: 'rand(60, 180)',
        count: 3,
        timeline: { delay },
        parent,
        x,
        children: {
          radius: [5, 3, 7],
          fill: el.colTxt,
          scale: { 1: 0, easing: 'quad.in' },
          pathScale: [0.8, null],
          degreeShift: ['rand(13, 60)', null],
          duration: 1000 / 3,
          easing: 'quint.out'
        }
      });

      return [crcl, brst];
    };

    // ---- main timeline ----
    const crtLoveTl = () => {
      const move = 1000;
      const boom = 200;
      const easing = 'sin.inOut';
      const easingBoom = 'sin.in';
      const easingOut = 'sin.out';
      const opts = { duration: move, easing, opacity: 1 };
      const delta = 150;

      return new mojs.Timeline().add([
        // reset all letters at start
        new mojs.Tween({
          duration: move,
          onStart: () => {
            [el.i, el.l, el.o, el.v, el.e, el.y, el.o2, el.u].forEach(el => {
              el.style.opacity = 1;
              el.style.transform = 'translate(0px, 0px) rotate(0deg) skew(0deg, 0deg) scale(1, 1)';
              el.style.opacity = 1;
            });
          },
          onComplete: () => {
            [el.l, el.o, el.v, el.e].forEach(el => el.style.opacity = 0);
            el.blop.play().catch(() => {});
          }
        }),

        new mojs.Tween({
          duration: move * 2 + boom,
          onComplete: () => {
            [el.y, el.o2].forEach(el => el.style.opacity = 0);
            el.blop.play().catch(() => {});
          }
        }),

        new mojs.Tween({
          duration: move * 3 + boom * 2 - delta,
          onComplete: () => {
            el.i.style.opacity = 0;
            el.blop.play().catch(() => {});
          }
        }),

        new mojs.Tween({
          duration: move * 3 + boom * 2,
          onComplete: () => {
            el.u.style.opacity = 0;
            el.blup.play().catch(() => {});
          }
        }),

        // fade all back in
        new mojs.Tween({
          duration: 50,
          delay: 4050,
          onUpdate: (progress) => {
            [el.i, el.l, el.o, el.v, el.e, el.y, el.o2, el.u].forEach(el => {
              el.style.transform = 'translate(0px, 0px) rotate(0deg) skew(0deg, 0deg) scale(1, 1)';
              el.style.opacity = 1 * progress;
            });
          },
          onComplete: () => {
            [el.i, el.l, el.o, el.v, el.e, el.y, el.o2, el.u].forEach(el => {
              el.style.opacity = 1;
              el.style.transform = 'translate(0px, 0px) rotate(0deg) skew(0deg, 0deg) scale(1, 1)';
            });
          }
        }),

        // ---- line left ----
        new mojs.Html({
          ...opts,
          el: el.lineLeft,
          x: { 0: 52 },
        }).then({
          duration: boom + move,
          easing,
          x: { to: 52 + 54 }
        }).then({
          duration: boom + move,
          easing,
          x: { to: 52 + 54 + 60 }
        }).then({
          duration: 150,
          easing,
          x: { to: 52 + 54 + 60 + 10 }
        }).then({
          duration: 300
        }).then({
          duration: 350,
          x: { to: 0 },
          easing: easingOut
        }),

        // ---- line right ----
        new mojs.Html({
          ...opts,
          el: el.lineRight,
          x: { 0: -52 },
        }).then({
          duration: boom + move,
          easing,
          x: { to: -52 - 54 }
        }).then({
          duration: boom + move,
          easing,
          x: { to: -52 - 54 - 60 }
        }).then({
          duration: 150,
          easing,
          x: { to: -52 - 54 - 60 - 10 }
        }).then({
          duration: 300
        }).then({
          duration: 350,
          x: { to: 0 },
          easing: easingOut
        }),

        // ---- I ----
        new mojs.Html({
          ...opts,
          el: el.i,
          x: { 0: 34 },
        }).then({
          duration: boom,
          easing: easingBoom,
          x: { to: 34 + 19 }
        }).then({
          duration: move,
          easing,
          x: { to: 34 + 19 + 40 }
        }).then({
          duration: boom,
          easing: easingBoom,
          x: { to: 34 + 19 + 40 + 30 }
        }).then({
          duration: move,
          easing,
          x: { to: 34 + 19 + 40 + 30 + 30 }
        }),

        // ---- L ----
        new mojs.Html({
          ...opts,
          el: el.l,
          x: { 0: 15 },
        }),

        // ---- O ----
        new mojs.Html({
          ...opts,
          el: el.o,
          x: { 0: 11 },
        }),

        // ---- V ----
        new mojs.Html({
          ...opts,
          el: el.v,
          x: { 0: 3 },
        }),

        // ---- E ----
        new mojs.Html({
          ...opts,
          el: el.e,
          x: { 0: -3 },
        }),

        // ---- Y ----
        new mojs.Html({
          ...opts,
          el: el.y,
          x: { 0: -20 },
        }).then({
          duration: boom,
          easing: easingBoom,
          x: { to: -20 - 33 }
        }).then({
          duration: move,
          easing,
          x: { to: -20 - 33 - 24 }
        }),

        // ---- O2 ----
        new mojs.Html({
          ...opts,
          el: el.o2,
          x: { 0: -27 },
        }).then({
          duration: boom,
          easing: easingBoom,
          x: { to: -27 - 27 }
        }).then({
          duration: move,
          easing,
          x: { to: -27 - 27 - 30 }
        }),

        // ---- U ----
        new mojs.Html({
          ...opts,
          el: el.u,
          x: { 0: -32 },
        }).then({
          duration: boom,
          easing: easingBoom,
          x: { to: -32 - 21 }
        }).then({
          duration: move,
          easing,
          x: { to: -32 - 21 - 36 }
        }).then({
          duration: boom,
          easing: easingBoom,
          x: { to: -32 - 21 - 36 - 31 }
        }).then({
          duration: move,
          easing,
          x: { to: -32 - 21 - 36 - 31 - 27 }
        }),

        // ---- heart shape ----
        new mojs.Shape({
          parent: el.container,
          shape: 'heart',
          delay: move,
          fill: el.colHeart,
          x: -64,
          scale: { 0: 0.95, easing: easingHeart },
          duration: 500
        }).then({
          x: { to: -62, easing },
          scale: { to: 0.65, easing },
          duration: boom + move - 500,
        }).then({
          duration: boom - 50,
          x: { to: -62 + 48 },
          scale: { to: 0.90 },
          easing: easingBoom
        }).then({
          duration: 125,
          scale: { to: 0.8 },
          easing: easingOut
        }).then({
          duration: 125,
          scale: { to: 0.85 },
          easing: easingOut
        }).then({
          duration: move - 200,
          scale: { to: 0.45 },
          easing
        }).then({
          delay: -75,
          duration: 150,
          x: { to: 0 },
          scale: { to: 0.90 },
          easing: easingBoom
        }).then({
          duration: 125,
          scale: { to: 0.8 },
          easing: easingOut
        }).then({
          duration: 125,
          scale: { to: 0.85 },
          easing: easingOut
        }).then({
          duration: 125,
        }).then({
          duration: 350,
          scale: { to: 0 },
          easing: easingOut
        }),

        // ---- booms ----
        ...crtBoom(move, -64, 46),
        ...crtBoom(move * 2 + boom, 18, 34),
        ...crtBoom(move * 3 + boom * 2 - delta, -64, 34),
        ...crtBoom(move * 3 + boom * 2, 45, 34)
      ]);
    };

    // ---- init & loop ----
    let loveTl = null;
    
    function startAnimation() {
      if (loveTl) {
        loveTl.stop();
      }
      loveTl = crtLoveTl();
      loveTl.play();
    }

    startAnimation();
    setInterval(() => { 
      if (loveTl) {
        loveTl.replay(); 
      }
    }, 4300);

    // ---- sound toggle ----
    const volume = 0.2;
    el.blup.volume = volume;
    el.blop.volume = volume;

    let soundOn = true;
    el.sound.addEventListener('click', function() {
      if (soundOn) {
        el.blup.volume = 0;
        el.blop.volume = 0;
        this.classList.add('sound--off');
        this.textContent = '🔇 sound';
      } else {
        el.blup.volume = volume;
        el.blop.volume = volume;
        this.classList.remove('sound--off');
        this.textContent = '🔊 sound';
      }
      soundOn = !soundOn;
    });

    // Handle resize to maintain proportions
    function handleResize() {
      const container = document.querySelector('.container');
      const svg = document.querySelector('.svg-container');
      const moContainer = document.querySelector('.mo-container');
      if (window.innerWidth < 520) {
        const width = window.innerWidth * 0.9;
        const height = width * 0.4;
        container.style.width = width + 'px';
        container.style.height = height + 'px';
      } else {
        container.style.width = '50rem';
        container.style.height = '20rem';
      }
    }

    window.addEventListener('resize', handleResize);
    handleResize();

  })();
</script>
</body>
</html>
